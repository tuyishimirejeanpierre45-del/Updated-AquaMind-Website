<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Weather - AquaMind AI</title>

<style>

body{

font-family:Arial;

margin:0;

background: linear-gradient(135deg, #74b9ff 0%, #a3d8f4 40%, #dff6ff 100%);

background-attachment: fixed;

min-height: 100vh;

}

header{

background:rgba(46, 125, 50, 0.9);

color:white;

padding:15px;

text-align:center;

position:relative;

}

.logout{

position:absolute;

right:20px;

top:18px;

background:rgba(255,255,255,0.2);

color:white;

padding:6px 14px;

border-radius:6px;

text-decoration:none;

font-size:13px;

}

.nav{

background:rgba(27, 94, 32, 0.92);

padding:12px;

text-align:center;

}

.nav a{

color:white;

text-decoration:none;

margin:0 15px;

font-weight:bold;

}

.nav a.active{

text-decoration:underline;

}

.card{

width:80%;

max-width:420px;

margin:30px auto;

background:rgba(255, 255, 255, 0.93);

padding:25px;

border-radius:10px;

box-shadow:0 0 10px gray;

text-align:center;

}

.card h2{

margin-top:0;

color:#1B5E20;

}

.advice-box{

margin-top:15px;

padding:12px;

border-radius:8px;

font-size:14px;

}

.advice-good{

background:#E8F5E9;

color:#1B5E20;

border:1px solid #A5D6A7;

}

.advice-warn{

background:#FFF3E0;

color:#E65100;

border:1px solid #FFCC80;

}

.stats-row{

display:flex;

justify-content:space-around;

margin-top:10px;

}

.stats-row div{

font-size:13px;

color:#555;

}

</style>

</head>

<body>

<header>

<h1>🌦 Weather</h1>
<a href="login.html" class="logout">Logout</a>

</header>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="assistant.html">Assistant</a>
<a href="analytics.html">Analytics</a>
<a href="weather.html" class="active">Weather</a>
<a href="settings.html">Settings</a>
</div>

<div class="card">

<h2>Kigali</h2>

<h1 id="tempVal">26°C</h1>

<div class="stats-row">
<div>💧 Humidity<br><b id="humVal">68%</b></div>
<div>🌧 Rain Chance<br><b id="rainVal">20%</b></div>
<div>💨 Wind<br><b id="windVal">12 km/h</b></div>
</div>

<div class="advice-box" id="adviceBox">
<p><b>AI Advice:</b></p>
<p id="adviceText">No rain expected today. Irrigation is recommended.</p>
</div>

</div>

<script>

// ---------------------------------------------------------
// WEATHER-AWARE IRRIGATION ADVICE
// Mirrors the logic from Slide 10: if rain is likely soon,
// recommend skipping irrigation to save water. Currently uses
// the static rainChance value below — replace with a real
// weather API call (e.g. OpenWeatherMap) for live forecasts.
// ---------------------------------------------------------

const rainChance = 20; // percent — swap for live API data

function updateAdvice(){
  let adviceBox = document.getElementById("adviceBox");
  let adviceText = document.getElementById("adviceText");

  if(rainChance >= 50){
    adviceBox.className = "advice-box advice-warn";
    adviceText.innerText = "Imvura irateganyijwe nyuma y'iminota 40. Ndasaba kudakoresha pompe. (Rain expected soon — irrigation not recommended.)";
  } else {
    adviceBox.className = "advice-box advice-good";
    adviceText.innerText = "No rain expected today. Irrigation is recommended.";
  }
}

updateAdvice();

</script>

</body>

</html>
